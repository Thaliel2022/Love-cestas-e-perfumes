    <script>
      (function() {
        try {
          var savedFavicon = localStorage.getItem('lovecestas_app_favicon');
          if (savedFavicon) {
             var link = document.querySelector("link[rel~='icon']");
             if (link) {
                 link.href = savedFavicon;
             }
          }
        } catch(e) {}
      })();
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
